name: Ingestor de E-mails

on:
  schedule:
    # Roda a cada 10 minutos (GitHub Actions mínimo confiável é ~5-10 min)
    - cron: "*/10 * * * *"
  workflow_dispatch:  # permite disparo manual

jobs:
  ingerir:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ingestor (modo job único)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAP_HOST:    ${{ secrets.IMAP_HOST }}
          IMAP_USER:    ${{ secrets.IMAP_USER }}
          IMAP_PASS:    ${{ secrets.IMAP_PASS }}
          IMAP_FOLDER:  ${{ secrets.IMAP_FOLDER }}
        run: python ingestor.py --once
