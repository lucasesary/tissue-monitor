services:
  - type: web
    name: tissue-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_FOLDER
        value: INBOX
      - key: PYTHON_VERSION
        value: "3.11"
